name: Torrent Seeder

on:
  schedule:
    # Run every minute
    - cron: '*/1 * * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'seed_torrent.py'
      - '.github/workflows/seed.yml'

env:
  MAGNET_LINK: "magnet:?xt=urn:btih:556fc79fec8ea92c32df2cc2833a573a30b07e84&dn=Detective%20Conan%201201%20(2160)%20by%20DCAIM%20%7BTags%3AL0%3BV15%3BC1%3BA%3Dja%3BS%3Den%3B%7D&tr=https%3A%2F%2Ftracker.nekobt.to%2Fapi%2Ftracker%2Fpublic%2Fannounce&tr=http%3A%2F%2Fnyaa.tracker.wf%3A7777%2Fannounce&tr=udp%3A%2F%2Ftracker.opentrackr.org%3A1337%2Fannounce&tr=udp%3A%2F%2Fopen.stealth.si%3A80%2Fannounce&tr=udp%3A%2F%2Ftracker.torrent.eu.org%3A451%2Fannounce&tr=udp%3A%2F%2Fexodus.desync.com%3A6969%2Fannounce&tr=udp%3A%2F%2Ftracker.openbittorrent.com%3A6969%2Fannounce&tr=udp%3A%2F%2Ftracker.moeking.me%3A6969%2Fannounce"
  TARGET_RATIO: "8.0"
  SAVE_DIR: "./torrent_data"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hours max (GitHub Actions limit is 6 hours)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install libtorrent
      
      - name: Cache torrent data
        uses: actions/cache@v4
        with:
          path: ./torrent_data
          key: torrent-data-${{ hashFiles('seed_torrent.py') }}
          restore-keys: |
            torrent-data-
      
      - name: Get disk space info
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Directory Contents ==="
          ls -la ./torrent_data 2>/dev/null || echo "No torrent_data directory yet"
      
      - name: Run torrent seeder
        run: |
          echo "Starting torrent seeder at $(date)"
          python seed_torrent.py
          echo "Seeder finished at $(date)"
      
      - name: Show results
        if: always()
        run: |
          echo "=== Final Status ==="
          ls -lah ./torrent_data 2>/dev/null || echo "No data directory"
          echo "=== Disk Space After ==="
          df -h
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: seeder-logs
          path: |
            *.log
            ./torrent_data/*.log
          retention-days: 7
